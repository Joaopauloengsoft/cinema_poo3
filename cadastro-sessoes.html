<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaPixel - Cinema</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="icon" type="image/svg+xml" href="/img/Mini-Logo.png">
</head>

<body data-bs-theme="dark" class="bg-dark">

    <nav class="navbar bg-black navbar-expand-lg border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand text-warning fs-2" href="/index.html">
                <img src="/img/logo.png" alt="Logo" width="200" height="50" class="d-inline-block align-text-top me-0">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a href="/index.html" class="nav-link text-warning">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="/cadastro-filmes.html" class="nav-link text-warning">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a href="/cadastro-salas.html" class="nav-link text-warning">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a href="/cadastro-sessoes.html" class="nav-link text-warning">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="/venda-ingressos.html" class="nav-link text-warning">Vendas de Ingressos</a>
                    </li>
                    <li class="nav-item">
                        <a href="/sessoes.html" class="nav-link text-warning">Sessões Disponíveis</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="text-center" style="margin: 20px;">
        <h1><span class="badge text-bg-warning">Cadastro de Sessões</span></h1>
    </div>
    <form class="row g-3" style="margin: 20px;">
        <div class="col-md-6">
            <label for="selectFilme" class="form-label">Filme</label>
            <select id="selectFilme" class="form-select" required>
                <option selected>Selecione um filme cadastrado</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="selectSala" class="form-label text-white">Sala</label>
            <select id="selectSala" class="form-select" required>
                <option value="">Selecione a sala...</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="inputDataHora" class="form-label">Data e Hora</label>
            <input type="datetime-local" class="form-control" id="inputDataHora">
        </div>
        <div class="col-md-6">
            <label for="inputPreco" class="form-label">Preço</label>
            <input type="number" step="0.01" class="form-control" id="inputPreco"
                placeholder="Digite o preço da sessão">
        </div>
        <div class="col-md-6">
            <label for="inputIdioma" class="form-label">Idioma</label>
            <select id="inputIdioma" class="form-select">
                <option selected>Selecione o idioma do filme</option>
                <option>Legendado</option>
                <option>Dublado</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="inputFormato" class="form-label">Formato</label>
            <select id="inputFormato" class="form-select">
                <option selected>Selecione o formato</option>
                <option>2D</option>
                <option>3D</option>
                <option>IMAX</option>
            </select>
        </div>    
        <div class="col-12">
                <button type="submit" class="btn btn-warning">Salvar Sessão</button>
            </div>
    </form>

    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
</body>

</html>
