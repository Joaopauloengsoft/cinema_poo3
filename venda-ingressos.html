<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaPixel - Cinema</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="icon" type="image/svg+xml" href="/img/Mini-Logo.png" width="10" height="5">
</head>

<body data-bs-theme="dark" class="bg-dark">

    <nav class="navbar bg-black navbar-expand-lg border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand text-warning fs-2" href="/index.html">
                <img src="/img/logo.png" alt="Logo" width="200" height="50" class="d-inline-block align-text-top me-0">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a href="/index.html" class="nav-link text-warning">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="/cadastro-filmes.html" class="nav-link text-warning">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a href="/cadastro-salas.html" class="nav-link text-warning">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a href="/cadastro-sessoes.html" class="nav-link text-warning">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a href="/venda-ingressos.html" class="nav-link text-warning">Vendas de Ingressos</a>
                    </li>
                    <li class="nav-item">
                        <a href="/sessoes.html" class="nav-link text-warning">Sessões Disponíveis</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="text-center" style="margin: 20px;">
        <h1><span class="badge text-bg-warning">Venda de Ingressos</span></h1>
    </div>
    <form class="row g-3" style="margin: 20px;">
        <div class="col-md-6">
            <label for="selectSessao" class="form-label">Sessão</label>
            <select id="selectSessao" class="form-select" required>
                <option selected>Selecione uma sessão disponível</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="inputNomeCliente" class="form-label">Nome do Cliente</label>
            <input type="text" class="form-control" id="nomeCliente" placeholder="Digite o nome do cliente">
        </div>
        <div class="col-md-6">
            <label for="inputCPF" class="form-label">CPF do Cliente</label>
            <input type="text" class="form-control" id="cpfCliente" placeholder="Digite o CPF do cliente">
        </div>
        <div class="col-md-6">
            <label for="inputAssento" class="form-label">Assento</label>
            <input type="text" class="form-control" id="assento" placeholder="Digite a letra/número do assento">
        </div>
        <div class="col-md-6">
            <label for="selectPagamento" class="form-label">Pagamento</label>
            <select id="selectPagamento" class="form-select" required>
                 <option selected>Selecione a forma de pagamento</option>
                 <option>Cartão de Crédito</option>
                 <option>Cartão de Débito</option>
                 <option>Pix</option>
                 <option>Dinheiro</option>
            </select>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-warning">Confirmar Venda</button>
        </div>
    </form>    

    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
</body>

</html>
