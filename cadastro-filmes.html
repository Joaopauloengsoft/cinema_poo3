            <a class="navbar-brand text-warning fs-2" href="/index.html">

                    class="d-inline-block align-text-top me-0">MegaPixel
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a href="/index.html" class="nav-link text-warning">Home</a>
                    </li>
                    <li class="nav-item">
                        <a href="/cadastro-filmes.html" class="nav-link text-warning">Filmes</a>

    <div class="text-center" style="margin: 20px;">
        <h1><span class="badge text-bg-warning">Cadastro de Filmes</span></h1>
    </div>

    <form class="row g-3" style="margin: 20px;">
        <div class="col-md-6">
            <label for="inputNomeFilme" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nomeFilme" placeholder="Digite o título do filme">
        </div>
        <div class="col-md-6">
            <label for="inputGenero" class="form-label">Gênero</label>
            <select id="inputGenero" class="form-select">
                <option selected>Selecione o gênero do filme</option>
                <option>Ação</option>
                <option>Aventura</option>
                <option>Comédia</option>
                <option>Drama</option>
                <option>Ficção Científica</option>
                <option>Romance</option>
                <option>Terror</option>
            </select>
        </div>
        <div class="col-12">
            <label for="inputSinopse" class="form-label">Sinopse</label>
            <textarea class="form-control" id="inputSinopse" placeholder="Digite a sinopse do filme"
                rows="3"></textarea>
        </div>
        <div class="col-md-6">
            <label for="inputClassificacao" class="form-label">Classificação</label>
            <select id="inputClassificacao" class="form-select">
                <option selected>Selecione a classificação indicativa</option>
                <option>Livre</option>
                <option>10 anos</option>
                <option>12 anos</option>
                <option>14 anos</option>
                <option>16 anos</option>
                <option>18 anos</option>
            </select>
        </div>
        <div class="col-md-6">
            <label for="inputDuracao" class="form-label">Duração</label>
            <input type="number" class="form-control" id="inputDuracao" placeholder="Digite a duração do filme em minutos">
        </div>
        </div>
        <div class="col-md-2">
            <label for="inputEstreia" class="form-label">Data de Estreia</label>
            <input type="date" class="form-control" id="inputEstreia">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-warning">Salvar Filme</button>
        </div>
    </form>

    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
</body>

</html>
